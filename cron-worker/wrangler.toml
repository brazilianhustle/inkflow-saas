name = "inkflow-cron"
main = "src/index.js"
compatibility_date = "2026-04-01"
# Dispatcher de crons que chama os endpoints CF Pages em inkflowbrasil.com.
# Cada trigger abaixo dispara o scheduled() handler em src/index.js; a rota
# e escolhida por event.cron → endpoint map.

[triggers]
crons = [
  "0 12 * * *",     # 09:00 BRT diario → /api/cron/expira-trial
  "0 2 * * *",      # 23:00 BRT diario → /api/cleanup-tenants
  "0 9 * * *",      # 06:00 BRT diario → /api/cron/reset-agendamentos
  "*/30 * * * *",   # a cada 30min     → /api/cron/monitor-whatsapp
  "*/15 * * * *",   # a cada 15min     → /api/cron/auto-retomar-bot (PR 3 kill-switch)
  "*/5 * * * *",    # a cada 5min      → /api/cron/audit-escalate
  "0 4 * * 1",      # seg 01:00 BRT    → /api/cron/audit-cleanup
  "0 6 * * *",      # 03:00 BRT diario → /api/cron/audit-key-expiry
  "0 */6 * * *",    # 00:00/06:00/12:00/18:00 UTC → /api/cron/audit-deploy-health
  "30 */6 * * *",   # 00:30/06:30/12:30/18:30 UTC → /api/cron/audit-billing-flow
  "15 */6 * * *",   # 00:15/06:15/12:15/18:15 UTC → /api/cron/audit-vps-limits (pivot Routine→cron-worker — CCR allowlist bloqueio)
  "0 7 * * *",      # 04:00 BRT diario → /api/cron/audit-rls-drift (pivot Routine→cron-worker — qualidade conjunta + consistência pattern; ver decisions/2026-04-30-rls-drift-architecture.md)
]

# Observability: todos os console.log aparecem em Workers → inkflow-cron → Logs
[observability]
enabled = true
