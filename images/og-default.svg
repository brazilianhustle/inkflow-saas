<?xml version="1.0" encoding="UTF-8"?>
<!--
  InkFlow Open Graph default image (placeholder)
  Dimensão: 1200 x 630 (recomendação Facebook/LinkedIn/WhatsApp)

  IMPORTANTE: WhatsApp e Facebook preferem PNG/JPG over SVG pra link previews.
  Este SVG é placeholder. Pra produção, gerar PNG 1200x630 (ex: usar Claude
  Design pra gerar uma versão visualmente caprichada e exportar como PNG).

  Substituir por /images/og-default.png assim que disponível e atualizar
  meta tag og:image em index.html (e demais páginas).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo placeholder mark -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="url(#accent)"/>
  <text x="112" y="125" font-family="system-ui, sans-serif" font-size="32" font-weight="900" fill="#000" text-anchor="middle">I</text>

  <!-- InkFlow wordmark -->
  <text x="170" y="125" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#f0f0f0" letter-spacing="-1">
    <tspan fill="url(#accent)">Ink</tspan>Flow
  </text>

  <!-- Headline -->
  <text x="80" y="320" font-family="system-ui, sans-serif" font-size="64" font-weight="800" fill="#f0f0f0" letter-spacing="-2">
    Atendimento WhatsApp
  </text>
  <text x="80" y="395" font-family="system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#accent)" letter-spacing="-2">
    pra estúdio de tatuagem
  </text>

  <!-- Sub -->
  <text x="80" y="460" font-family="system-ui, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.64)">
    Bot que orça, agenda e cobra sinal — 24h
  </text>

  <!-- CTA pill -->
  <rect x="80" y="510" width="280" height="60" rx="14" fill="url(#accent)"/>
  <text x="220" y="548" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#000" text-anchor="middle">
    Trial grátis 7 dias →
  </text>

  <!-- Domain -->
  <text x="1120" y="595" font-family="system-ui, monospace" font-size="18" font-weight="500" fill="rgba(255,255,255,0.42)" text-anchor="end">
    inkflowbrasil.com
  </text>
</svg>
