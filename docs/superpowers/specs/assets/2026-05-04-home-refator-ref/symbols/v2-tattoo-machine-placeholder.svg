<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>InkFlow Tattoo Machine — placeholder geométrico</title>
  <desc>Concept placeholder for spec. Final version should be brush-stroke ink style silhouette, hand-traced or AI-generated then vectorized.</desc>

  <!-- Frame (top body) — main triangular/rectangular frame -->
  <path d="M 60 30 L 140 30 L 140 60 L 110 60 L 110 80 L 90 80 L 90 60 L 60 60 Z" fill="currentColor"/>

  <!-- Coil cylinders (top-left of frame) -->
  <circle cx="78" cy="44" r="10" fill="currentColor"/>
  <circle cx="122" cy="44" r="10" fill="currentColor"/>

  <!-- Tube + grip (vertical body going down) -->
  <rect x="92" y="80" width="16" height="50" fill="currentColor"/>

  <!-- Grip (textured part) -->
  <rect x="86" y="125" width="28" height="35" fill="currentColor"/>

  <!-- Needle tip pointing down -->
  <path d="M 96 160 L 104 160 L 100 178 Z" fill="currentColor"/>

  <!-- Splatter / ink drops at the tip -->
  <circle cx="92" cy="186" r="2" fill="currentColor"/>
  <circle cx="108" cy="184" r="1.5" fill="currentColor"/>
  <circle cx="100" cy="192" r="2.5" fill="currentColor"/>
</svg>
